<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <title>LLM-from-query-to-result · L1 App</title>
  <style>
    body { font: 14px/1.5 -apple-system, sans-serif; max-width: 760px; margin: 40px auto; padding: 0 16px; color: #222; }
    h1 { font-size: 18px; }
    #log { border: 1px solid #ddd; border-radius: 8px; padding: 16px; min-height: 240px; white-space: pre-wrap; background: #fafafa; }
    .done { color: #0a7; font-family: ui-monospace, monospace; margin: 4px 0; }
    .err  { color: #c33; }
    .thought    { color: #555; font-style: italic; margin: 4px 0; font-family: ui-monospace, monospace; }
    .action     { color: #0a7; margin: 4px 0; font-family: ui-monospace, monospace; }
    .observation { color: #888; margin: 4px 0 8px 16px; font-family: ui-monospace, monospace; }
    form { display: flex; gap: 8px; margin-top: 16px; }
    input[type=text] { flex: 1; padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font: inherit; }
    button { padding: 8px 16px; border: 0; border-radius: 6px; background: #222; color: #fff; font: inherit; cursor: pointer; }
    button:disabled { opacity: .4; }
    small { color: #888; }
  </style>
</head>
<body>
  <h1>LLM-from-query-to-result · L1 App 层</h1>
  <p><small>每个 token 都是本地 GPT-2 (L4) 在 L5 上 forward 出来的——零外部 LLM API。试试：<code>What is the capital of France?</code></small></p>
  <div id="log"></div>
  <form id="f">
    <input type="text" id="q" placeholder="说点什么…" autocomplete="off" />
    <button id="send">发送</button>
  </form>

<script>
const log = document.getElementById('log');
const q   = document.getElementById('q');
const send = document.getElementById('send');

document.getElementById('f').addEventListener('submit', async (e) => {
  e.preventDefault();
  const query = q.value.trim();
  if (!query) return;
  q.value = ''; send.disabled = true;

  log.textContent = '';
  const resp = await fetch('/chat', {
    method: 'POST',
    headers: {'content-type': 'application/json'},
    body: JSON.stringify({query}),
  });

  // Stream SSE: split on "\n\n", each chunk starts with "data: ".
  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let buf = '';
  while (true) {
    const {value, done} = await reader.read();
    if (done) break;
    buf += dec.decode(value, {stream: true});
    let i;
    while ((i = buf.indexOf('\n\n')) >= 0) {
      const frame = buf.slice(0, i); buf = buf.slice(i + 2);
      if (!frame.startsWith('data: ')) continue;
      const ev = JSON.parse(frame.slice(6));
      render(ev);
    }
  }
  send.disabled = false;
});

function render(ev) {
  if (ev.type === 'token') {
    log.append(ev.v);
  } else if (ev.type === 'thought') {
    const el = document.createElement('div');
    el.className = 'thought';
    el.textContent = `💭 ${ev.v}`;
    log.appendChild(el);
  } else if (ev.type === 'action') {
    const el = document.createElement('div');
    el.className = 'action';
    el.textContent = `🔧 ${ev.v}`;
    log.appendChild(el);
  } else if (ev.type === 'observation') {
    const el = document.createElement('div');
    el.className = 'observation';
    el.textContent = `   ↳ ${ev.v}`;
    log.appendChild(el);
  } else if (ev.type === 'done') {
    const el = document.createElement('div');
    el.className = 'done';
    el.textContent = `✓ done`;
    log.appendChild(el);
  } else if (ev.type === 'error') {
    const el = document.createElement('div');
    el.className = 'err';
    el.textContent = `✗ ${ev.message}`;
    log.appendChild(el);
  }
  log.scrollTop = log.scrollHeight;
}
</script>
</body>
</html>
